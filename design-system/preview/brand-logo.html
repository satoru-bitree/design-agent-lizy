<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">
<style>
  body { padding: 0; }
  .card { padding: 32px; display: flex; flex-direction: column; gap: 28px; }
  .row { display: flex; align-items: baseline; gap: 6px; }
  .wm { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; font-size: 56px; color: var(--fg); letter-spacing: -0.025em; line-height: 1; font-variation-settings: "opsz" 144; }
  .wm em { font-style: italic; color: var(--mint); font-weight: 500; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--mint); transform: translateY(-4px); }
  .alt { background: var(--mint); border-radius: 14px; padding: 28px 32px; display: flex; align-items: baseline; gap: 6px; }
  .alt .wm { color: var(--bg); }
  .alt .wm em { color: var(--bg); opacity: 0.55; }
  .alt .dot { background: var(--bg); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.06em; text-transform: uppercase; }
</style></head><body><div class="card">
<div>
  <div class="meta">Wordmark · on dark</div>
  <div class="row" style="margin-top:12px">
    <span class="wm">Liz<em>y</em></span>
    <span class="dot"></span>
  </div>
</div>
<div class="alt">
  <span class="wm">Liz<em>y</em></span>
  <span class="dot"></span>
</div>
</div></body></html>
