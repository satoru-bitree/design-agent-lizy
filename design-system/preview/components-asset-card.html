<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 28px; }
  .panel { background: var(--surface-1); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 380px; }
  .h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .title { font-family: var(--font-display); font-weight: 700; font-size: 18px; }
  .icbtn { width: 28px; height: 28px; border-radius: 8px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; color: var(--fg-dim); }
  .thumbs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .th { aspect-ratio: 1/1.1; background: linear-gradient(135deg,#3a2e1f,#1a1410); border-radius: 8px; position: relative; overflow: hidden; }
  .badge { position: absolute; top: 8px; left: 8px; background: var(--surface-1); color: var(--fg); font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 5px; letter-spacing: 0.04em; }
  .actions { display: flex; flex-direction: column; gap: 10px; }
  .btn { padding: 12px; border-radius: 10px; text-align: center; font-size: 14px; font-weight: 600; }
  .btn-primary { background: var(--mint); color: var(--bg); }
  .btn-secondary { background: transparent; color: var(--fg); border: 1px solid var(--border-strong); }
</style></head><body>
<div class="panel">
  <div class="h">
    <div class="title kr">패키지 디자인</div>
    <div class="icbtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
    </div>
  </div>
  <div class="thumbs">
    <div class="th"><span class="badge">DE</span></div>
    <div class="th" style="background:linear-gradient(135deg,#1f3a2a,#0e1a14)"><span class="badge">FR</span></div>
  </div>
  <div class="actions">
    <div class="btn btn-primary kr">승인</div>
    <div class="btn btn-secondary kr">수정 요청</div>
  </div>
</div>
</body></html>
