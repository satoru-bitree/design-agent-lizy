<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 28px; display: flex; gap: 28px; align-items: flex-end; }
  .fab { width: 56px; height: 56px; border-radius: 50%; background: var(--mint); color: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 4px 24px rgba(0,200,150,0.25); }
  .fab.deep { background: var(--mint-deep); transform: scale(0.96); box-shadow: none; }
  .fab.hover { background: var(--mint-hover); }
  .grp { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.06em; text-transform: uppercase; }
</style></head><body>
<div class="grp"><div class="fab">+</div><div class="lbl">rest</div></div>
<div class="grp"><div class="fab hover">+</div><div class="lbl">hover</div></div>
<div class="grp"><div class="fab deep">+</div><div class="lbl">press</div></div>
</body></html>
