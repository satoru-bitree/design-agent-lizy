<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .name { font-weight: 700; font-size: 22px; color: var(--fg); }
  .specimen { font-size: 14px; color: var(--fg-dim); line-height: 1.5; }
  .alphabet { font-size: 11px; color: var(--fg-muted); letter-spacing: 0.06em; }
  .manrope { font-family: 'Manrope', sans-serif; }
  .inter { font-family: 'Inter', sans-serif; }
  .pretendard { font-family: 'Pretendard', sans-serif; }
</style></head><body><div class="card">
<div class="stack">
  <div class="meta">DISPLAY</div>
  <div class="name manrope">Manrope</div>
  <div class="specimen manrope">Design Agent</div>
  <div class="alphabet manrope">ABCDEFGabcdefg 0123456789</div>
</div>
<div class="stack">
  <div class="meta">BODY</div>
  <div class="name inter">Inter</div>
  <div class="specimen inter">High-sensitivity creative</div>
  <div class="alphabet inter">ABCDEFGabcdefg 0123456789</div>
</div>
<div class="stack">
  <div class="meta">KOREAN</div>
  <div class="name pretendard">Pretendard</div>
  <div class="specimen pretendard">고감도 크리에이티브</div>
  <div class="alphabet pretendard">가나다라마바사 0123456789</div>
</div>
</div></body></html>
