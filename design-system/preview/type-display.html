<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display: flex; flex-direction: column; gap: 16px; }
  .item { display: grid; grid-template-columns: 130px 1fr; align-items: baseline; gap: 24px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.02em; }
  .specimen { color: var(--fg); }
  .display { font-family: var(--font-display); font-weight: 700; font-size: 32px; line-height: 1.2; letter-spacing: -0.01em; }
  .h2 { font-family: var(--font-display); font-weight: 700; font-size: 22px; line-height: 1.3; }
  .h3 { font-family: var(--font-display); font-weight: 600; font-size: 18px; line-height: 1.35; }
</style></head><body><div class="card">
<div class="item"><div class="meta">DISPLAY · 32 / 700</div><div class="specimen display kr">새 에셋 요청</div></div>
<div class="item"><div class="meta">H2 · 22 / 700</div><div class="specimen h2 kr">브랜드 가이드 적용됨</div></div>
<div class="item"><div class="meta">H3 · 18 / 600</div><div class="specimen h3 kr">패키지 디자인</div></div>
</div></body></html>
