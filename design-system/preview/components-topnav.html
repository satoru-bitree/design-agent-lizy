<style>

  .right { display: flex; gap: 16px; align-items: center; color: var(--fg-dim); }
  .ic { width: 18px; height: 18px; }
  .av { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,#5a4a3a,#2a1f15); border: 1.5px solid var(--mint); }
