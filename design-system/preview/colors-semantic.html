<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { aspect-ratio: 1.6/1; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
  .lbl { font-size: 11px; color: var(--fg-muted); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-dim); }
  .note { margin-top: 14px; font-size: 11px; color: var(--fg-muted); }
</style></head><body><div class="card">
<div class="row">
  <div class="sw"><div class="chip" style="background:#00C896;color:#0D0D0D">SUCCESS</div><div class="lbl">success</div><div class="hex">#00C896</div></div>
  <div class="sw"><div class="chip" style="background:#F5A524;color:#0D0D0D">WARNING</div><div class="lbl">warning</div><div class="hex">#F5A524</div></div>
  <div class="sw"><div class="chip" style="background:#EF4444;color:#FFFFFF">DANGER</div><div class="lbl">danger</div><div class="hex">#EF4444</div></div>
  <div class="sw"><div class="chip" style="background:#3B82F6;color:#FFFFFF">INFO</div><div class="lbl">info</div><div class="hex">#3B82F6</div></div>
</div>
<div class="note">Inferred from mint accent + standard contrasts. None visible in source — confirm before shipping.</div>
</div></body></html>
