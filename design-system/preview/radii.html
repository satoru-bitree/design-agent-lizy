<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 88px; height: 64px; background: var(--surface-1); border: 1px solid var(--border); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: 0.04em; }
  .val { font-size: 11px; color: var(--fg-dim); }
</style></head><body><div class="card">
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">r-sm</div><div class="val">8 · thumb</div></div>
  <div class="item"><div class="box" style="border-radius:10px"></div><div class="lbl">r-md</div><div class="val">10 · button</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">r-lg</div><div class="val">12 · input</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl">r-xl</div><div class="val">16 · card</div></div>
  <div class="item"><div class="box" style="border-radius:9999px;width:88px;height:36px"></div><div class="lbl">r-pill</div><div class="val">∞ · chip</div></div>
  <div class="item"><div class="box" style="border-radius:50%;width:56px;height:56px"></div><div class="lbl">circle</div><div class="val">FAB · avatar</div></div>
</div></body></html>
