<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 32px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--mint); border-radius: 4px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .val { font-size: 11px; color: var(--fg-dim); }
</style></head><body><div class="card">
<div class="row">
  <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="lbl">space-1</div><div class="val">4</div></div>
  <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="lbl">space-2</div><div class="val">8</div></div>
  <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="lbl">space-3</div><div class="val">12</div></div>
  <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="lbl">space-4</div><div class="val">16</div></div>
  <div class="item"><div class="bar" style="width:20px;height:20px"></div><div class="lbl">space-5</div><div class="val">20</div></div>
  <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="lbl">space-6</div><div class="val">24</div></div>
  <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="lbl">space-8</div><div class="val">32</div></div>
  <div class="item"><div class="bar" style="width:40px;height:40px"></div><div class="lbl">space-10</div><div class="val">40</div></div>
  <div class="item"><div class="bar" style="width:48px;height:48px"></div><div class="lbl">space-12</div><div class="val">48</div></div>
  <div class="item"><div class="bar" style="width:64px;height:64px"></div><div class="lbl">space-16</div><div class="val">64</div></div>
</div>
</div></body></html>
